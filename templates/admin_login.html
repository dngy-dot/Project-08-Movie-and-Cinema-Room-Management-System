{% extends "admin_base.html" %}
{% block content %}
<div class="container" style="max-width: 400px; margin: 4rem auto;">
  <h2 class="mb-4">Đăng nhập quản trị</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Mật khẩu admin</label>
      <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" autofocus>
    </div>
    <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
  </form>
</div>
{% endblock %}
