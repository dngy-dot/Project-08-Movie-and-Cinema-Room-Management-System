{% extends "admin_base.html" %}
{% block content %}
<div class="admin-header">
  <div>
    <h2 class="soft-title">Quản lý rạp phim</h2>
    <div class="admin-muted">Quản lý hệ thống rạp để phân bổ phòng và suất chiếu.</div>
  </div>
</div>
<form method="post" class="row g-2 mb-4 soft-form">
  <div class="col-md-4"><input class="form-control" name="cinema_name" placeholder="Tên rạp" required></div>
  <div class="col-md-6"><input class="form-control" name="address" placeholder="Địa chỉ"></div>
  <div class="col-md-2"><button class="btn btn-success w-100">Thêm</button></div>
</form>
<div class="table-responsive cgv-table-wrap">
  <table class="table table-hover align-middle mb-0 admin-table">
    <thead><tr><th>ID</th><th>Tên rạp</th><th>Địa chỉ</th><th>Thao tác</th></tr></thead>
    <tbody>
      {% for c in cinemas %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.cinema_name }}</td>
        <td>{{ c.address or '-' }}</td>
        <td class="d-flex gap-2">
          <a class="btn btn-outline-warning btn-sm" href="{{ url_for('edit_cinema', cinema_id=c.id) }}">Sửa</a>
          <form method="post" action="{{ url_for('delete_cinema', cinema_id=c.id) }}" onsubmit="return confirm('Bạn có chắc muốn xóa rạp này?');">
            <button class="btn btn-outline-danger btn-sm">Xóa</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="text-center">Chưa có rạp.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
