{% extends "admin_base.html" %}
{% block content %}
<div class="admin-header">
  <div>
    <h2 class="soft-title">Quản lý phòng chiếu</h2>
    <div class="admin-muted">Quản lý thông tin phòng và sức chứa.</div>
  </div>
</div>
<form method="post" class="row g-2 mb-4 soft-form">
  <div class="col-md-3">
    <select class="form-select" name="cinema_id" required>
      <option value="">Chọn rạp</option>
      {% for c in cinemas %}
      <option value="{{ c.id }}">{{ c.cinema_name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-4"><input class="form-control" name="room_name" placeholder="Tên phòng" required></div>
  <div class="col-md-3"><input class="form-control" type="number" min="1" name="capacity" placeholder="Sức chứa" required></div>
  <div class="col-md-2"><button class="btn btn-success w-100">Thêm</button></div>
</form>
<div class="table-responsive cgv-table-wrap">
  <table class="table table-hover align-middle mb-0 admin-table">
    <thead><tr><th>ID</th><th>Rạp</th><th>Phòng</th><th>Sức chứa</th><th>Thao tác</th></tr></thead>
    <tbody>
      {% for r in rooms %}
      <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.cinema.cinema_name }}</td>
        <td>{{ r.room_name }}</td>
        <td>{{ r.capacity }}</td>
        <td class="d-flex gap-2">
          <a class="btn btn-outline-warning btn-sm" href="{{ url_for('edit_room', room_id=r.id) }}">Sửa</a>
          <form method="post" action="{{ url_for('delete_room', room_id=r.id) }}" onsubmit="return confirm('Bạn có chắc muốn xóa phòng này?');">
            <button class="btn btn-outline-danger btn-sm">Xóa</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="5" class="text-center">Chưa có phòng.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
